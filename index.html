<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        #giftButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.3s ease;
        }

        #giftButton:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #loveMessage {
            display: none;
            font-size: 3.5rem;
            color: #c9184a;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            animation: heartBeat 1.2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: #590d22;
            font-weight: 500;
        }

        /* Heart Animation Styles */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: moveUp 4s linear forwards;
        }

        @keyframes moveUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="heading">A Special Gift for Sneha Madam Jiii 🌹</h1>
        
        <button id="giftButton" onclick="showLove()">Click here, Sneha!</button>
        
        <div id="loveMessage">I LOVE YOU ❤️</div>
        
        <div class="footer">Made by Akash</div>
    </div>

    <script>
        function showLove() {
            // Button aur heading ko hide karo
            document.getElementById('giftButton').style.display = 'none';
            document.getElementById('heading').style.display = 'none';
            
            // Love message dikhao
            const msg = document.getElementById('loveMessage');
            msg.style.display = 'block';

            // Dilo ki baarish shuru karo
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️'; // Tum yahan different types ke dil bhi add kar sakte ho
            
            // Random position aur speed
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            
            document.body.appendChild(heart);

            // 4 second baad element delete kar do memory bachane ke liye
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    </script>
</body>
</html>
